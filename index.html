<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imam Malik Science & Tahfiz College</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Hidden form for Netlify Form integration -->
    <form name="admission-applications" netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="gender" />
      <input type="text" name="dateOfBirth" />
      <input type="text" name="targetClassId" />
      <input type="text" name="guardianName" />
      <input type="text" name="guardianPhone" />
      <textarea name="address"></textarea>
      <input type="text" name="passportPhoto" />
      <input type="text" name="hasSpecialNeeds" />
      <textarea name="specialNeedsDetails"></textarea>
      <input type="text" name="primarySchool" />
      <input type="text" name="primarySchoolStart" />
      <input type="text" name="primarySchoolEnd" />
      <input type="text" name="islamiyyaSchool" />
      <input type="text" name="islamiyyaSchoolStart" />
      <input type="text" name="islamiyyaSchoolEnd" />
      <input type="text" name="paymentStatus" />
      <input type="text" name="transactionId" />
    </form>
  </body>
</html>
